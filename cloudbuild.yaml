steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/medicaidguard-api:$SHORT_SHA'
      - '.'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/medicaidguard-api:$SHORT_SHA'

substitutions:
  _REGION: 'asia-southeast1'
  _REPOSITORY: 'medicaidguard'
